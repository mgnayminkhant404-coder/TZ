<!DOCTYPE html>
<html>
<head>
<title>Congratulations 🎉</title>

<style>
body {
  text-align: center;
  background: linear-gradient(to right, pink, purple);
  color: white;
  font-family: sans-serif;
  overflow: hidden;
}

/* Image */
img {
  width: 200px;
  border-radius: 20px;
  margin-top: 20px;
}

/* Heart Style */
.heart {
  position: fixed;
  top: -10px;
  color: red;
  font-size: 20px;
  animation: fall linear infinite;
}

/* Animation */
@keyframes fall {
  0% {
    transform: translateY(0);
    opacity: 1;
  }
  100% {
    transform: translateY(100vh);
    opacity: 0;
  }
}
</style>
</head>

<body>

<h1>🎂 Congratulations 🎉</h1>

<img src="thuzar.jpg">

<p>You've completed your final year exams! 🌟<br>
Wishing you success and happiness in your next journey! 💖 💖</p>

<audio controls autoplay loop>
  <source src="ရှမ်းမလေး.mp3" type="audio/mpeg">
</audio>

<script>
// Create hearts
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "💖";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (Math.random() * 3 + 2) + "s";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}

// Generate hearts every 300ms
setInterval(createHeart, 300);
</script>

</body>
</html>
